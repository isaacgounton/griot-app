version: "3.8"

# GPU override for Speaches - use with: docker-compose -f docker-compose.prod.yml -f docker-compose.gpu.yml up

services:
  speaches:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda12.6.3
    environment:
      WHISPER__INFERENCE_DEVICE: cuda
      WHISPER__COMPUTE_TYPE: float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
