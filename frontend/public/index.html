<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Griot - AI Video Creation Platform</title>
  <meta name="description"
    content="Create engaging videos with AI-powered content generation, research, and automation." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet">

  <!-- Theme colors -->
  <meta name="theme-color" content="#1976d2" />
  <meta name="msapplication-TileColor" content="#1976d2" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Griot - AI Video Creation Platform" />
  <meta property="og:description"
    content="Create engaging videos with AI-powered content generation, research, and automation." />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Griot - AI Video Creation Platform" />
  <meta property="twitter:description"
    content="Create engaging videos with AI-powered content generation, research, and automation." />
  <meta property="twitter:image" content="/twitter-image.png" />

  <!-- Preload critical resources -->
  <link rel="preload" href="/static/fonts/Roboto-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/static/fonts/Roboto-Medium.woff2" as="font" type="font/woff2" crossorigin>
</head>

<body>
  <div id="root"></div>

  <!-- Loading fallback -->
  <noscript>
    <div
      style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif;">
      <div style="text-align: center;">
        <h1>JavaScript Required</h1>
        <p>This application requires JavaScript to run. Please enable JavaScript in your browser.</p>
      </div>
    </div>
  </noscript>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
