# Production configuration - optimized for deployment
# Can be used standalone for Coolify deployments

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-griot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-griot}",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources: {}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources: {}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  speaches:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cpu
    expose:
      - "8000"
    ports:
      - "${SPEACHES_PORT:-8880}:8000"
    volumes:
      - speaches_models:/home/ubuntu/.cache/huggingface/hub
    environment:
      LOG_LEVEL: ${SPEACHES_LOG_LEVEL:-info}
      WHISPER__INFERENCE_DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8
      WHISPER__CPU_THREADS: 4
      WHISPER__NUM_WORKERS: 1
      STT_MODEL_TTL: -1
      TTS_MODEL_TTL: -1
      VAD_MODEL_TTL: -1
      ENABLE_UI: "${SPEACHES_ENABLE_UI:-true}"
      # Suppress CUDA errors for CPU-only deployment
      ORT_DISABLE_CUDA: "1"
      PYTHONUNBUFFERED: "1"
      # Loopback URL for Gradio UI to call its own API (avoids HTTP->HTTPS redirect via reverse proxy)
      LOOPBACK_HOST_URL: "http://localhost:8000"
      # Preload Kokoro TTS and Whisper STT at startup
      PRELOAD_MODELS: '["speaches-ai/Kokoro-82M-v1.0-ONNX", "Systran/faster-whisper-base"]'
      # HuggingFace cache must match the volume mount path
      HF_HOME: /home/ubuntu/.cache/huggingface
      # Chat completion integration (for voice chat feature) - uses Pollinations OpenAI-compatible API
      CHAT_COMPLETION_BASE_URL: ${CHAT_COMPLETION_BASE_URL:-https://gen.pollinations.ai/v1}
      CHAT_COMPLETION_API_KEY: ${CHAT_COMPLETION_API_KEY:-not-needed}
      # Speaches API key (optional) - set SPEACHES_API_KEY to protect the Speaches API
      API_KEY: ${SPEACHES_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources: {}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      target: production
      # Enable BuildKit for faster builds with caching
      args:
        BUILDKIT_INLINE_CACHE: 1
      cache_from:
        - ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE:-griot}:latest
        - ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE:-griot}:cache
    expose:
      - "8000"
    volumes:
      - huggingface_models:/app/models/huggingface
    environment:
      # Production optimizations
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      DEBUG: "false"

      # Core API configuration
      API_KEY: ${API_KEY}

      # Admin authentication
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      # S3 Storage configuration
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}

      # Database configuration using environment variables
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-griot}}
      POSTGRES_DB: ${POSTGRES_DB:-griot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis configuration
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # AI Services
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      PIXABAY_API_KEY: ${PIXABAY_API_KEY}

      # Hugging Face Cache Configuration
      HF_HOME: /app/models/huggingface

      # TTS Configuration
      TTS_PROVIDER: ${TTS_PROVIDER:-kokoro}

      # Speaches sidecar (TTS + STT)
      SPEACHES_BASE_URL: ${SPEACHES_BASE_URL:-http://speaches:8000/v1}
      SPEACHES_API_KEY: ${SPEACHES_API_KEY:-}

      # Email configuration
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Griot}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}

      # Frontend URL for email verification links
      FRONTEND_URL: ${FRONTEND_URL}

      # ComfyUI Integration
      COMFYUI_URL: ${COMFYUI_URL}
      COMFYUI_USERNAME: ${COMFYUI_USERNAME}
      COMFYUI_PASSWORD: ${COMFYUI_PASSWORD}
      COMFYUI_API_KEY: ${COMFYUI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      speaches:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/health",
          "--connect-timeout",
          "10",
        ]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s
    deploy:
      resources: {}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # Production command - startup script handles uvicorn startup
    command: "./scripts/startup.sh"

volumes:
  postgres_data:
  redis_data:
  huggingface_models:
  speaches_models:
