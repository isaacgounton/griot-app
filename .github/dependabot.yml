version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "your-username"  # Replace with your GitHub username
    assignees:
      - "your-username"  # Replace with your GitHub username
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group updates by type
    groups:
      fastapi-ecosystem:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "pydantic*"
          - "starlette*"
      ai-ml-packages:
        patterns:
          - "openai*"
          - "transformers*"
          - "torch*"
          - "numpy*"
          - "scipy*"
          - "librosa*"
      media-processing:
        patterns:
          - "ffmpeg-python*"
          - "opencv-python*"
          - "Pillow*"
          - "moviepy*"
          - "pydub*"
      aws-cloud:
        patterns:
          - "boto3*"
          - "botocore*"
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security"

  # Node.js dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 3
    groups:
      vue-ecosystem:
        patterns:
          - "vue*"
          - "@vue/*"
          - "vite*"
      dev-tools:
        patterns:
          - "eslint*"
          - "typescript*"
          - "@types/*"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
